<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HaramiLandlord — Find Rentals. Expose Scammers. Stay Safe.</title>
<meta name="description" content="India's #1 tenant protection platform. Browse verified PGs & flats, report fraudulent landlords, connect with fellow tenants."/>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏠</text></svg>"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root{
  --bg:#050918;
  --bg2:#0b1230;
  --card:#0d1535;
  --card2:#111b40;
  --border:rgba(99,130,255,0.15);
  --border2:rgba(99,130,255,0.28);
  --accent:#4f7dff;
  --accent2:#7c5cfc;
  --red:#ff4757;
  --gold:#ffd32a;
  --text:#e8eeff;
  --muted:#6b7db3;
  --muted2:#3d4f7a;
  --radius:14px;
  --nav:64px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
h1,h2,h3,h4,h5{font-family:'Outfit',sans-serif}
input,textarea,select,button{font-family:'Space Grotesk',sans-serif}
button{cursor:pointer}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--muted2);border-radius:99px}
a{color:inherit;text-decoration:none}

/* ── STARS BACKGROUND ── */
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.stars::before,.stars::after{content:'';position:absolute;inset:0;background-image:
  radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,.6) 0%, transparent 0%),
  radial-gradient(1px 1px at 25% 40%, rgba(255,255,255,.4) 0%, transparent 0%),
  radial-gradient(1.5px 1.5px at 45% 10%, rgba(255,255,255,.7) 0%, transparent 0%),
  radial-gradient(1px 1px at 60% 55%, rgba(255,255,255,.5) 0%, transparent 0%),
  radial-gradient(1px 1px at 75% 20%, rgba(255,255,255,.4) 0%, transparent 0%),
  radial-gradient(1.5px 1.5px at 85% 70%, rgba(255,255,255,.6) 0%, transparent 0%),
  radial-gradient(1px 1px at 90% 35%, rgba(255,255,255,.3) 0%, transparent 0%),
  radial-gradient(1px 1px at 35% 75%, rgba(255,255,255,.5) 0%, transparent 0%),
  radial-gradient(1px 1px at 55% 85%, rgba(255,255,255,.4) 0%, transparent 0%),
  radial-gradient(1.5px 1.5px at 70% 90%, rgba(255,255,255,.6) 0%, transparent 0%),
  radial-gradient(1px 1px at 15% 65%, rgba(255,255,255,.3) 0%, transparent 0%),
  radial-gradient(1px 1px at 40% 50%, rgba(255,255,255,.4) 0%, transparent 0%),
  radial-gradient(1px 1px at 80% 45%, rgba(255,255,255,.5) 0%, transparent 0%),
  radial-gradient(1.5px 1.5px at 20% 30%, rgba(255,255,255,.7) 0%, transparent 0%),
  radial-gradient(1px 1px at 95% 10%, rgba(255,255,255,.4) 0%, transparent 0%),
  radial-gradient(1px 1px at 5% 90%, rgba(255,255,255,.3) 0%, transparent 0%),
  radial-gradient(1px 1px at 50% 60%, rgba(255,255,255,.5) 0%, transparent 0%),
  radial-gradient(1.5px 1.5px at 65% 30%, rgba(255,255,255,.6) 0%, transparent 0%);
background-size:600px 600px}
.stars::after{background-size:800px 800px;opacity:.5;animation:twinkle 8s ease-in-out infinite alternate}
@keyframes twinkle{0%{opacity:.3}100%{opacity:.7}}

/* ── GLOW ORBS ── */
.orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0}
.orb1{width:500px;height:500px;background:radial-gradient(circle,rgba(79,125,255,.18) 0%,transparent 70%);top:-100px;right:-100px}
.orb2{width:400px;height:400px;background:radial-gradient(circle,rgba(255,71,87,.12) 0%,transparent 70%);bottom:200px;left:-100px}

/* ── NAV ── */
#appnav{position:sticky;top:0;z-index:800;background:rgba(5,9,24,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);height:var(--nav);display:flex;align-items:center;justify-content:space-between;padding:0 1.25rem}
.logo{font-family:'Outfit',sans-serif;font-weight:900;font-size:1.25rem;cursor:pointer;display:flex;align-items:center;gap:0.25rem;white-space:nowrap}
.logo span.hl{color:var(--accent)}
.logo .beta{background:var(--accent);color:#fff;font-size:0.42rem;font-weight:700;padding:2px 5px;border-radius:3px;text-transform:uppercase;vertical-align:super;margin-left:3px}
/* desktop links */
.nav-links{display:flex;gap:2px;align-items:center}
.nav-links button{background:transparent;border:none;color:var(--muted);padding:0.38rem 0.7rem;border-radius:8px;font-size:0.82rem;font-weight:500;transition:all .2s}
.nav-links button.active,.nav-links button:hover{background:rgba(79,125,255,.12);color:var(--text)}
.nav-right{display:flex;gap:0.5rem;align-items:center}
/* hamburger */
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:6px;background:transparent;border:none;z-index:900}
.hamburger span{display:block;width:22px;height:2px;background:var(--text);border-radius:2px;transition:all .3s}
.hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.hamburger.open span:nth-child(2){opacity:0;transform:scaleX(0)}
.hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
/* mobile menu */
.mobile-menu{display:none;position:fixed;top:var(--nav);left:0;right:0;bottom:0;background:rgba(5,9,24,0.98);backdrop-filter:blur(20px);z-index:700;flex-direction:column;padding:1.5rem;gap:0.5rem;overflow-y:auto;border-top:1px solid var(--border)}
.mobile-menu.open{display:flex}
.mobile-menu button{background:transparent;border:none;color:var(--muted);padding:0.85rem 1rem;border-radius:10px;font-size:1rem;font-weight:600;text-align:left;width:100%;transition:all .2s}
.mobile-menu button.active,.mobile-menu button:hover{background:rgba(79,125,255,.12);color:var(--text)}
.mobile-menu .m-divider{height:1px;background:var(--border);margin:0.5rem 0}
.mobile-menu .m-auth{display:flex;gap:0.5rem;padding-top:0.5rem}

/* ── BUTTONS ── */
.btn{border:none;border-radius:10px;font-weight:600;padding:0.6rem 1.25rem;font-size:0.88rem;cursor:pointer;transition:all .2s;font-family:'Space Grotesk',sans-serif}
.btn:hover{transform:translateY(-1px);opacity:.9}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 4px 20px rgba(79,125,255,.3)}
.btn-outline{background:transparent;border:1px solid var(--accent);color:var(--accent)}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--muted)}
.btn-red{background:linear-gradient(135deg,#ff4757,#c0392b);color:#fff;box-shadow:0 4px 20px rgba(255,71,87,.25)}
.btn-sm{padding:0.38rem 0.85rem;font-size:0.78rem;border-radius:8px}

/* ── CARDS ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius)}
.card:hover{border-color:var(--border2)}

/* ── FORM INPUTS ── */
.fi{background:var(--card2);border:1px solid var(--border);color:var(--text);padding:0.6rem 0.9rem;border-radius:9px;font-size:0.875rem;outline:none;font-family:'Space Grotesk',sans-serif;transition:border .2s;width:100%}
.fi:focus{border-color:var(--accent)}
.fl{display:block;font-size:0.76rem;color:var(--muted);margin-bottom:0.35rem;font-weight:500}

/* ── SEVERITY BADGE ── */
.sev-h{background:rgba(255,71,87,.15);color:#ff8a95;border:1px solid rgba(255,71,87,.3);font-size:0.66rem;font-weight:700;padding:3px 9px;border-radius:999px;text-transform:uppercase;letter-spacing:.06em}
.sev-m{background:rgba(255,211,42,.1);color:#ffd32a;border:1px solid rgba(255,211,42,.25);font-size:0.66rem;font-weight:700;padding:3px 9px;border-radius:999px;text-transform:uppercase;letter-spacing:.06em}
.sev-l{background:rgba(52,211,153,.1);color:#34d399;border:1px solid rgba(52,211,153,.25);font-size:0.66rem;font-weight:700;padding:3px 9px;border-radius:999px;text-transform:uppercase;letter-spacing:.06em}

/* ── SECTION WRAPPER ── */
.wrap{max-width:1160px;margin:0 auto;padding:0 1.1rem}
.section{padding:2.5rem 0}

/* ── LISTING CARD ── */
.lcard{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:all .25s;display:flex;flex-direction:column}
.lcard:hover{transform:translateY(-4px);border-color:var(--accent);box-shadow:0 12px 40px rgba(79,125,255,.15)}
.lcard.scam{border-color:rgba(255,71,87,.4)}
.lcard.scam:hover{border-color:var(--red);box-shadow:0 12px 40px rgba(255,71,87,.15)}
.lcard-thumb{height:140px;background:linear-gradient(135deg,var(--card),var(--card2));display:flex;align-items:center;justify-content:center;font-size:2.8rem;position:relative;flex-shrink:0}
.lcard-body{padding:0.9rem 1rem 1rem;flex:1;display:flex;flex-direction:column}
.lcard-title{font-family:'Outfit',sans-serif;font-weight:700;font-size:0.92rem;line-height:1.3;margin-bottom:0.2rem;color:var(--text)}
.lcard-loc{font-size:0.72rem;color:var(--muted);margin-bottom:0.55rem}
.lcard-price{font-size:1.1rem;font-weight:700;color:var(--gold);margin-bottom:0.5rem}
.lcard-tags{display:flex;gap:0.3rem;flex-wrap:wrap;margin-bottom:0.55rem}
.tag{font-size:0.6rem;padding:2px 7px;border-radius:5px;background:rgba(79,125,255,.1);border:1px solid rgba(79,125,255,.2);color:#8fa8ff}
.lcard-footer{display:flex;justify-content:space-between;align-items:center;margin-top:auto;padding-top:0.55rem;border-top:1px solid var(--border)}

/* ── COMPLAINT CARD ── */
.ccard{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.1rem;margin-bottom:0.85rem;transition:border .2s}
.ccard.high{border-color:rgba(255,71,87,.3)}

/* ── MAP ── */
.leaflet-container{background:var(--bg)!important}
.leaflet-tile{filter:brightness(0.65) saturate(0.5) hue-rotate(190deg)}
.leaflet-popup-content-wrapper{background:var(--card);border:1px solid var(--border2);color:var(--text);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.7)}
.leaflet-popup-tip{background:var(--card)}
.leaflet-popup-content{margin:10px 14px;font-family:'Space Grotesk',sans-serif;font-size:13px}
.cpm{background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:4px 8px;border-radius:6px;white-space:nowrap;border:2px solid rgba(255,255,255,.3);box-shadow:0 2px 12px rgba(79,125,255,.5);cursor:pointer;transition:transform .15s}
.cpm:hover{transform:scale(1.1)}
.cpm.scam{background:var(--red)}

/* ── TOAST ── */
.toast{position:fixed;bottom:1.5rem;right:1.5rem;z-index:9999;background:var(--card2);border:1px solid var(--border2);border-left:3px solid var(--accent);padding:0.8rem 1.2rem;border-radius:10px;font-size:0.875rem;display:flex;align-items:center;gap:0.5rem;box-shadow:0 8px 32px rgba(0,0,0,.6);animation:slideInR .3s ease;max-width:320px}
.toast.err{border-left-color:var(--red)}

/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;z-index:9000;background:rgba(0,0,0,.85);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;padding:1rem}
.modal-box{background:var(--card);border:1px solid var(--border2);border-radius:18px;padding:2rem;width:100%;max-width:440px;position:relative;animation:fadeUp .25s ease;max-height:92vh;overflow-y:auto}
.modal-close{position:absolute;top:12px;right:12px;background:var(--card2);border:1px solid var(--border);color:var(--muted);width:28px;height:28px;border-radius:7px;cursor:pointer;font-size:0.8rem;display:flex;align-items:center;justify-content:center}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideInR{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@keyframes glow{0%,100%{box-shadow:0 0 20px rgba(79,125,255,.3)}50%{box-shadow:0 0 40px rgba(79,125,255,.6)}}

/* ── HERO ── */
.hero{min-height:calc(100vh - var(--nav));display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:3rem 1.25rem;position:relative}
.hero-badge{display:inline-flex;align-items:center;gap:0.4rem;background:rgba(79,125,255,.1);border:1px solid rgba(79,125,255,.3);color:#8fa8ff;font-size:0.75rem;font-weight:600;padding:0.3rem 1rem;border-radius:999px;margin-bottom:1.75rem;letter-spacing:.03em}
.hero h1{font-family:'Outfit',sans-serif;font-size:clamp(2.2rem,6vw,4.8rem);font-weight:900;line-height:1.05;letter-spacing:-.03em;margin-bottom:1.1rem}
.hero h1 .accent{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero p{font-size:1rem;color:var(--muted);max-width:460px;line-height:1.8;margin-bottom:2rem}
.hero-search{display:flex;gap:0.5rem;width:100%;max-width:500px;margin-bottom:2rem}
.hero-search input{flex:1;background:rgba(13,21,53,.8);border:1px solid var(--border2);color:var(--text);padding:0.75rem 1rem;border-radius:11px;font-size:0.88rem;outline:none;font-family:'Space Grotesk',sans-serif;transition:border .2s}
.hero-search input:focus{border-color:var(--accent)}
.hero-btns{display:flex;gap:0.9rem;flex-wrap:wrap;justify-content:center}
.hero-stats{display:flex;gap:2.5rem;flex-wrap:wrap;justify-content:center;padding-top:2.5rem;margin-top:2.5rem;border-top:1px solid var(--border);width:100%;max-width:680px}
.hero-stats .stat .n{font-family:'Outfit',sans-serif;font-size:1.8rem;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-stats .stat .l{font-size:0.72rem;color:var(--muted);margin-top:2px}

/* ── UFO FLOAT ── */
.ufo{font-size:3rem;animation:float 4s ease-in-out infinite;margin-bottom:1rem;filter:drop-shadow(0 0 20px rgba(79,125,255,.5))}

/* ── FEATURES GRID ── */
.feat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem}
.feat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.4rem;cursor:pointer;transition:all .25s}
.feat-card:hover{border-color:var(--accent);transform:translateY(-3px);background:var(--card2)}
.feat-icon{font-size:1.7rem;margin-bottom:0.6rem}
.feat-title{font-family:'Outfit',sans-serif;font-weight:700;font-size:0.9rem;margin-bottom:0.25rem}
.feat-desc{font-size:0.74rem;color:var(--muted);line-height:1.6}

/* ── SECTION HEADER ── */
.sec-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.2rem;flex-wrap:wrap;gap:0.75rem}
.sec-title{font-family:'Outfit',sans-serif;font-size:1.35rem;font-weight:800}
.sec-sub{font-size:0.78rem;color:var(--muted);margin-top:2px}

/* ── CHIP/PILL ── */
.chip{display:inline-flex;align-items:center;gap:0.3rem;background:rgba(79,125,255,.08);border:1px solid rgba(79,125,255,.2);color:#7aa0ff;font-size:0.65rem;font-weight:600;padding:2px 8px;border-radius:999px;text-transform:uppercase;letter-spacing:.05em}

/* ── COMMUNITY ── */
.chat-wrap{display:grid;grid-template-columns:200px 1fr 185px;height:calc(100vh - var(--nav));overflow:hidden}
.chan-list{background:rgba(5,9,24,.9);border-right:1px solid var(--border);padding:0.9rem 0.6rem;overflow-y:auto}
.chan-btn{display:block;padding:0.38rem 0.6rem;border-radius:8px;cursor:pointer;font-size:0.8rem;color:var(--muted);background:transparent;border:none;width:100%;text-align:left;transition:all .15s;margin-bottom:2px}
.chan-btn.active,.chan-btn:hover{background:rgba(79,125,255,.12);color:var(--text)}
.chat-main{display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.msg-list{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:0.75rem}
.msg-row{display:flex;gap:0.5rem}
.msg-row.own{flex-direction:row-reverse}
.msg-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.58rem;font-weight:700;flex-shrink:0}
.msg-bubble{max-width:72%;border-radius:12px;padding:0.52rem 0.85rem;font-size:0.81rem;line-height:1.65;color:var(--text)}
.msg-bubble.in{background:var(--card);border:1px solid var(--border)}
.msg-bubble.out{background:rgba(79,125,255,.2);border:1px solid rgba(79,125,255,.25)}
.msg-bubble.ai{background:rgba(124,92,252,.12);border:1px solid rgba(124,92,252,.25)}
.msg-time{font-size:0.62rem;color:var(--muted2);margin-bottom:3px;text-align:right}
.own .msg-time{text-align:left}
.chat-input-row{padding:0.75rem;border-top:1px solid var(--border);display:flex;gap:0.4rem;align-items:center;flex-shrink:0;background:var(--bg)}
.members-panel{background:rgba(5,9,24,.9);border-left:1px solid var(--border);padding:0.9rem 0.6rem;overflow-y:auto}

/* ── MAP SIDEBAR ── */
.map-wrap{display:grid;grid-template-columns:280px 1fr;height:calc(100vh - var(--nav))}
.map-sidebar{background:var(--card);border-right:1px solid var(--border);overflow-y:auto;padding:0.9rem}
.map-item{display:flex;gap:0.55rem;padding:0.55rem;border-radius:9px;border:1px solid transparent;cursor:pointer;margin-bottom:0.3rem;transition:all .15s}
.map-item.sel{border-color:var(--accent);background:rgba(79,125,255,.07)}
.map-item:hover{background:rgba(79,125,255,.05)}
.map-overlay{position:absolute;bottom:16px;right:16px;z-index:800;background:var(--card);border:1px solid var(--border2);border-radius:13px;padding:1rem;width:245px;box-shadow:0 8px 32px rgba(0,0,0,.7);animation:fadeUp .2s ease}

/* ── STEP BAR ── */
.step-bar{display:flex;gap:0.4rem;margin-bottom:1.3rem}
.step-seg{flex:1;height:3px;border-radius:999px;transition:background .3s;cursor:pointer}

/* ── RESPONSIVE ── */
@media(max-width:900px){
  .hamburger{display:flex}
  .nav-links{display:none}
  .chat-wrap{grid-template-columns:1fr}
  .chan-list,.members-panel{display:none}
  .chat-wrap.mobile-chan .chan-list{display:flex;flex-direction:column;position:fixed;inset:0;top:var(--nav);z-index:600;padding:1rem}
  .map-wrap{grid-template-columns:1fr}
  .map-sidebar{display:none}
}
@media(max-width:640px){
  :root{--nav:56px}
  .hero h1{font-size:clamp(1.9rem,8vw,3rem)}
  .hero-search{flex-direction:column}
  .hero-btns{flex-direction:column;width:100%;max-width:360px}
  .hero-btns .btn{width:100%;text-align:center}
  .hero-stats{gap:1.5rem}
  .feat-grid{grid-template-columns:repeat(2,1fr)}
  .sec-hdr{flex-direction:column;align-items:flex-start}
  .modal-box{padding:1.4rem}
  .wrap{padding:0 0.9rem}
  .section{padding:1.75rem 0}
}
@media(max-width:380px){
  .feat-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="stars"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div id="root" style="position:relative;z-index:1"></div>

<script type="text/babel" data-presets="react">
const {useState,useEffect,useRef,useCallback,useMemo}=React;

const lsG=k=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null}catch{return null}};
const lsS=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}};

async function callClaude(system,userMsg,history=[]){
  const key=lsG("hl:apikey");
  if(!key)return "⚠️ No API key set. Click '🔑 AI Setup' in the menu to add your free Anthropic key.";
  const msgs=[...history.slice(-6).filter(m=>m&&m.text).map(m=>({role:m.own?"user":"assistant",content:m.text})),{role:"user",content:userMsg}];
  const body=JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:700,system,messages:msgs});
  const eps=[

/* ── PRIMITIVES ── */
function FI({className="fi",style,...p}){return <input {...p} className={className} style={style}/>;}
function FS({className="fi",style,children,...p}){return <select {...p} className={className} style={{cursor:"pointer",...(style||{})}}>{children}</select>;}

function Toast({t}){return <div className={`toast${t.type==="error"?" err":""}`}>{t.msg}</div>;}

function MW({children,onClose}){

}

  }).sort((a,b)=>srt==="price-asc"?a.price-b.price:srt==="price-desc"?b.price-a.price:srt==="rating"?(b.rating||0)-(a.rating||0):b.id>a.id?1:-1),[listings,srch,tf,bf,ff,cf,srt]);
  return <div className="wrap section">
    <div className="sec-hdr" style={{marginBottom:"1.4rem"}}>
      <div><div className="sec-title">Browse Rentals</div><div className="sec-sub">{filtered.length} listing{filtered.length!==1?"s":""} found</div></div>
      <button className="btn btn-primary btn-sm" onClick={()=>nav("list")}>+ List Property</button>
    </div>
    <div style={{display:"flex",gap:"0.45rem",flexWrap:"wrap",marginBottom:"1.3rem",alignItems:"center"}}>
      <FI value={srch} onChange={e=>setSrch(e.target.value)} placeholder="🔍 Search..." style={{width:160}}/>
      <FS value={cf} onChange={e=>setCf(e.target.value)} style={{width:"auto"}}><option value="">All Cities</option>{cities.map(c=><option key={c}>{c}</option>)}</FS>
      <FS value={tf} onChange={e=>setTf(e.target.value)} style={{width:"auto"}}><option value="">All Types</option><option>PG</option><option>Flat</option></FS>
      <FS value={bf} onChange={e=>setBf(e.target.value)} style={{width:"auto"}}><option value="">Any Budget</option><option value="5000">Under ₹5K</option><option value="10000">Under ₹10K</option><option value="20000">Under ₹20K</option><option value="50000">Under ₹50K</option></FS>
      <FS value={ff} onChange={e=>setFf(e.target.value)} style={{width:"auto"}}><option value="">Furnishing</option><option>Furnished</option><option>Semi-Furnished</option><option>Unfurnished</option></FS>
      <FS value={srt} onChange={e=>setSrt(e.target.value)} style={{width:"auto"}}><option value="newest">Newest</option><option value="price-asc">Price ↑</option><option value="price-desc">Price ↓</option><option value="rating">Top Rated</option></FS>
      {(srch||tf||bf||ff||cf)&&<button className="btn btn-ghost btn-sm" onClick={()=>{setSrch("");setTf("");setBf("");setFf("");setCf("");}}>✕ Clear</button>}
    </div>
    {filtered.length===0?<div style={{textAlign:"center",padding:"4rem",color:"var(--muted)"}}>🏚️ No listings match your filters.</div>:
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:"1rem"}}>
      {filtered.map(l=><LCard key={l.id} l={l} nav={nav}/>)}
    </div>}
  </div>;
}

/* ── DETAIL ── */
function Detail({listings,detailId,user,showToast,nav,setModal,setListings}){

  const [rev,setRev]=useState("");const [revR,setRevR]=useState(5);const [msg,setMsg]=useState("");
  const ask=async()=>{
    if(!aiQ.trim())return;setAiLoad(true);setAiRep("");
    const r=await callClaude("You are a helpful rental advisor for Indian tenants. Be concise and practical.",`Listing: ${JSON.stringify({title:l.title,city:l.city,area:l.area,type:l.type,price:l.price})}\nQuestion: ${aiQ}`);
    setAiRep(r);setAiLoad(false);
  };
  const postRev=()=>{
    if(!rev.trim()){showToast("Write something first","error");return;}
    setListings(p=>p.map(x=>x.id===l.id?{...x,reviews:[...(x.reviews||[]),{user:user.name,rating:revR,text:rev,ts:Date.now()}]}:x));

        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:"1rem",marginBottom:"0.9rem"}}>
          <div><h1 style={{fontSize:"1.4rem",fontWeight:800,marginBottom:"0.25rem",fontFamily:"Outfit"}}>{l.title}</h1><div style={{fontSize:"0.78rem",color:"var(--muted)"}}>📍 {l.area}, {l.city} · {l.type} · {l.furnish}</div></div>
          <div style={{textAlign:"right"}}><div style={{fontSize:"1.55rem",fontWeight:800,color:"var(--gold)",fontFamily:"Outfit"}}>₹{l.price.toLocaleString()}</div><div style={{fontSize:"0.7rem",color:"var(--muted2)"}}>per month · Deposit ₹{(l.deposit||0).toLocaleString()}</div></div>

          <div style={{fontSize:"0.78rem",color:"var(--muted)",marginBottom:"0.5rem"}}>👤 {l.contact} · 📱 {user?l.phone:"Login to see phone"}</div>

      {(l.reviews||[]).map((r,i)=>(
        <div key={i} style={{borderBottom:"1px solid var(--border)",paddingBottom:"0.75rem",marginBottom:"0.75rem"}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:"0.25rem"}}><span style={{fontWeight:600,fontSize:"0.82rem"}}>{r.user}</span><span style={{color:"var(--gold)",fontSize:"0.78rem"}}>{"★".repeat(r.rating)}</span></div>
          <p style={{fontSize:"0.78rem",color:"var(--muted)",lineHeight:1.65}}>{r.text}</p>
        </div>
      ))}
      {user?<div>
        <div style={{display:"flex",gap:3,marginBottom:"0.5rem"}}>{[1,2,3,4,5].map(n=><button key={n} onClick={()=>setRevR(n)} style={{background:"transparent",border:"none",fontSize:"1.2rem",color:n<=revR?"var(--gold)":"var(--border2)",cursor:"pointer"}}>★</button>)}</div>
        <div style={{display:"flex",gap:"0.4rem"}}>
          <FI value={rev} onChange={e=>setRev(e.target.value)} placeholder="Share your experience..." style={{flex:1}}/>
          <button className="btn btn-primary btn-sm" onClick={postRev}>Post</button>

      </div>:<button className="btn btn-ghost btn-sm" onClick={()=>setModal("login")}>Login to review</button>}

  </div>;
}

/* ── MAP ── */
function MapPage({listings,nav}){
  const mapRef=useRef(null);const mapInst=useRef(null);const [sel,setSel]=useState(null);
  useEffect(()=>{
    if(mapInst.current||!mapRef.current)return;
    const map=L.map(mapRef.current).setView([20.5937,78.9629],5);
    L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",{attribution:"© OpenStreetMap © CARTO",maxZoom:19}).addTo(map);
    listings.forEach(l=>{
      const icon=L.divIcon({className:"",html:`<div class="cpm${l.scam?" scam":""}">₹${Math.round(l.price/1000)}K${l.scam?" ⚠":""}</div>`,iconSize:null,iconAnchor:[0,0]});
      L.marker([l.lat,l.lng],{icon}).addTo(map).on("click",()=>setSel(l)).bindPopup(`<b>${l.title}</b><br>₹${l.price.toLocaleString()}/mo`);
    });
    mapInst.current=map;
    return()=>{if(mapInst.current){mapInst.current.remove();mapInst.current=null;}};
  },[]);
  return <div className="map-wrap">
    <div className="map-sidebar">
      <div style={{fontWeight:800,fontSize:"0.88rem",marginBottom:"0.85rem",color:"var(--muted)",fontFamily:"Outfit"}}>📍 {listings.length} Listings</div>
      {listings.map(l=>(
        <div key={l.id} className={`map-item${sel?.id===l.id?" sel":""}`} onClick={()=>setSel(l)}>
          <div style={{width:44,height:44,borderRadius:8,background:"var(--card2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.2rem",flexShrink:0}}>{l.type==="PG"?"🏠":"🏢"}</div>
          <div><div style={{fontWeight:600,fontSize:"0.76rem",lineHeight:1.3,marginBottom:1,color:"var(--text)"}}>{l.title}</div><div style={{fontSize:"0.65rem",color:"var(--muted)"}}>{l.area}, {l.city}</div><div style={{fontSize:"0.74rem",color:"var(--gold)",fontWeight:600,marginTop:1}}>₹{l.price.toLocaleString()}/mo</div></div>
        </div>
      ))}
    </div>
    <div style={{position:"relative"}}>
      <div ref={mapRef} style={{width:"100%",height:"100%"}}/>
      {sel&&<div className="map-overlay">
        <button onClick={()=>setSel(null)} style={{position:"absolute",top:8,right:8,background:"var(--card2)",border:"1px solid var(--border)",color:"var(--muted)",width:22,height:22,borderRadius:5,fontSize:"0.7rem",cursor:"pointer"}}>✕</button>
        <div className="chip" style={{marginBottom:6}}>{sel.type}</div>
        <div style={{fontWeight:700,fontSize:"0.87rem",marginBottom:3,lineHeight:1.3,paddingRight:20,fontFamily:"Outfit",color:"var(--text)"}}>{sel.title}</div>
        <div style={{fontSize:"0.7rem",color:"var(--muted)",marginBottom:6}}>📍 {sel.area}, {sel.city}</div>
        <div style={{fontSize:"1.1rem",fontWeight:800,color:"var(--gold)",marginBottom:8,fontFamily:"Outfit"}}>₹{sel.price.toLocaleString()}<span style={{fontSize:"0.63rem",color:"var(--muted2)",fontWeight:400}}>/mo</span></div>
        <button className="btn btn-primary" style={{width:"100%",padding:"0.42rem",fontSize:"0.76rem",borderRadius:7}} onClick={()=>nav("detail",sel.id)}>View Details</button>
      </div>}
    </div>
  </div>;
}

/* ── COMPLAINTS ── */
function Complaints({complaints,setComplaints,user,showToast,setModal}){
  const [tab,setTab]=useState("list");const [srch,setSrch]=useState("");const [sevF,setSevF]=useState("");
  const [form,setForm]=useState({landlord:"",address:"",phone:"",type:"",severity:"high",desc:""});
  const [aiTxt,setAiTxt]=useState("");const [aiLoad,setAiLoad]=useState(false);
  const filtered=useMemo(()=>complaints.filter(c=>{
    const q=srch.toLowerCase();
    return(!q||c.landlord.toLowerCase().includes(q)||c.address.toLowerCase().includes(q)||c.type.toLowerCase().includes(q))&&(!sevF||c.severity===sevF);
  }),[complaints,srch,sevF]);
  const submit=()=>{
    if(!form.landlord||!form.address||!form.type||!form.desc){showToast("Fill all required fields","error");return;}
    setComplaints(p=>[{...form,id:"c"+Date.now(),votes:0,voters:[],comments:[],date:"Just now",verified:false},...p]);
    setForm({landlord:"",address:"",phone:"",type:"",severity:"high",desc:""});
    showToast("✅ Complaint submitted!");setTab("list");
  };
  const vote=id=>{
    if(!user){setModal("login");return;}
    setComplaints(p=>p.map(c=>{
      if(c.id!==id)return c;
      const has=(c.voters||[]).includes(user.email);
      return{...c,votes:has?c.votes-1:c.votes+1,voters:has?c.voters.filter(v=>v!==user.email):[...(c.voters||[]),user.email]};
    }));
  };
  const analyze=async()=>{
    setAiLoad(true);setAiTxt("");
    const r=await callClaude("You are a tenant rights advisor in India. Be concise, under 200 words.","Analyze: 1) Top scam patterns 2) Legal options 3) Prevention tips. Data: "+JSON.stringify(complaints.slice(0,4)));
    setAiTxt(r);setAiLoad(false);
  };
  const topTypes=[...complaints.reduce((a,c)=>{a.set(c.type,(a.get(c.type)||0)+1);return a;},new Map())].sort((a,b)=>b[1]-a[1]).slice(0,4);
  return <div className="wrap section">
    <div className="sec-hdr" style={{marginBottom:"1.4rem"}}>
      <div><div className="sec-title">⚠️ Landlord Complaints</div><div className="sec-sub">Community-powered fraud database · {complaints.length} total</div></div>
      <button className={`btn btn-sm ${tab==="form"?"btn-ghost":"btn-red"}`} onClick={()=>setTab(t=>t==="form"?"list":"form")}>{tab==="form"?"← Back":"🚨 File Complaint"}</button>
    </div>
    {tab==="form"?<div className="card" style={{maxWidth:650,padding:"1.5rem"}}>
      <h3 style={{fontWeight:800,fontSize:"0.95rem",marginBottom:"1rem",fontFamily:"Outfit"}}>🚨 File a Complaint</h3>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:"0.8rem"}}>
        <div style={{gridColumn:"1/-1"}}><FL>Landlord / Agency Name *</FL><FI value={form.landlord} onChange={e=>setForm(f=>({...f,landlord:e.target.value}))} placeholder="Full name"/></div>
        <div><FL>Property Address *</FL><FI value={form.address} onChange={e=>setForm(f=>({...f,address:e.target.value}))} placeholder="Area, City"/></div>
        <div><FL>Phone (optional)</FL><FI value={form.phone} onChange={e=>setForm(f=>({...f,phone:e.target.value}))} placeholder="9XXXXXXXXX"/></div>
        <div><FL>Issue Type *</FL><FS value={form.type} onChange={e=>setForm(f=>({...f,type:e.target.value}))}><option value="">Select...</option>{["Deposit not returned","Fraudulent listing","Harassment","Illegal eviction","Overcharging","Fake photos","Other"].map(t=><option key={t}>{t}</option>)}</FS></div>
        <div><FL>Severity</FL><FS value={form.severity} onChange={e=>setForm(f=>({...f,severity:e.target.value}))}><option value="high">🔴 High</option><option value="medium">🟡 Medium</option><option value="low">🟢 Low</option></FS></div>
        <div style={{gridColumn:"1/-1"}}><FL>What happened *</FL><textarea value={form.desc} onChange={e=>setForm(f=>({...f,desc:e.target.value}))} placeholder="Be specific — dates, amounts, what was promised..." rows={5} className="fi" style={{resize:"vertical",minHeight:100}}/></div>
      </div>
      <button className="btn btn-red" style={{width:"100%",marginTop:"0.9rem",padding:"0.65rem"}} onClick={submit}>Submit Complaint</button>
    </div>:
    <div style={{display:"grid",gridTemplateColumns:"1fr",gap:"1.3rem"}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr auto auto",gap:"0.4rem",marginBottom:"0.9rem",flexWrap:"wrap"}}>
        <FI value={srch} onChange={e=>setSrch(e.target.value)} placeholder="🔍 Search landlord, area..."/>
        <FS value={sevF} onChange={e=>setSevF(e.target.value)} style={{width:"auto"}}><option value="">All</option><option value="high">🔴 High</option><option value="medium">🟡 Medium</option><option value="low">🟢 Low</option></FS>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr min(280px,100%)",gap:"1.2rem",alignItems:"start"}}>
        <div>
          {filtered.length===0?<div style={{textAlign:"center",padding:"3rem",color:"var(--muted)"}}>🔍 No complaints match.</div>:
          filtered.map(c=><CCard key={c.id} c={c} user={user} onVote={()=>vote(c.id)} showToast={showToast} setComplaints={setComplaints} setModal={setModal}/>)}
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:"0.9rem",position:"sticky",top:80}}>
          <div className="card" style={{padding:"0.95rem",borderColor:"rgba(79,125,255,.28)"}}>
            <h4 style={{fontWeight:800,fontSize:"0.85rem",marginBottom:"0.38rem",fontFamily:"Outfit"}}>🤖 AI Scam Analyzer</h4>
            <p style={{fontSize:"0.72rem",color:"var(--muted)",marginBottom:"0.65rem",lineHeight:1.6}}>Analyze patterns & get legal advice.</p>
            <button className="btn btn-primary" style={{width:"100%",padding:"0.48rem",fontSize:"0.78rem",opacity:aiLoad?.6:1}} onClick={analyze} disabled={aiLoad}>{aiLoad?"Analyzing...":"Analyze Patterns"}</button>
            {aiLoad&&<div style={{marginTop:"0.55rem",fontSize:"0.71rem",color:"var(--muted)",textAlign:"center",animation:"pulse 1.5s infinite"}}>Claude is thinking...</div>}
            {aiTxt&&<div style={{marginTop:"0.75rem",fontSize:"0.73rem",color:"var(--text)",lineHeight:1.72,borderTop:"1px solid var(--border)",paddingTop:"0.75rem"}}>{aiTxt}</div>}
          </div>
          <div className="card" style={{padding:"0.95rem"}}>
            <h4 style={{fontWeight:700,fontSize:"0.8rem",marginBottom:"0.65rem",color:"#ff8a95",fontFamily:"Outfit"}}>🚨 Top Scam Types</h4>
            {topTypes.map(([type,count])=>(<div key={type} style={{display:"flex",justifyContent:"space-between",marginBottom:"0.38rem"}}><span style={{fontSize:"0.7rem",color:"var(--muted)"}}>{type}</span><span style={{fontSize:"0.7rem",color:"var(--red)",fontWeight:700}}>{count}</span></div>))}
          </div>
        </div>
      </div>
    </div>}
  </div>;
}

function CCard({c,user,onVote,showToast,setComplaints,setModal}){
  const [show,setShow]=useState(false);const [cm,setCm]=useState("");
  const has=user&&(c.voters||[]).includes(user.email);
  const addCm=()=>{
    if(!user){setModal("login");return;}
    if(!cm.trim())return;
    setComplaints(p=>p.map(x=>x.id===c.id?{...x,comments:[...(x.comments||[]),{user:user.name,text:cm,ts:Date.now()}]}:x));
    setCm("");showToast("Comment added!");
  };
  return <div className={`ccard${c.severity==="high"?" high":""}`}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"0.5rem",gap:"0.45rem",flexWrap:"wrap"}}>
      <div>
        <div style={{display:"flex",alignItems:"center",gap:"0.42rem",flexWrap:"wrap"}}>
          <span style={{fontFamily:"Outfit",fontWeight:700,fontSize:"0.93rem"}}>🧑 {c.landlord}</span>
          {c.verified&&<span style={{fontSize:"0.58rem",background:"rgba(52,211,153,.1)",color:"#34d399",border:"1px solid rgba(52,211,153,.2)",padding:"1px 5px",borderRadius:999,fontWeight:600}}>✓ Verified</span>}
        </div>
        <div style={{fontSize:"0.7rem",color:"var(--muted)",marginTop:2}}>{c.type}</div>
      </div>
      <SB s={c.severity}/>
    </div>
    <div style={{display:"flex",gap:"0.75rem",fontSize:"0.7rem",color:"var(--muted2)",marginBottom:"0.6rem",flexWrap:"wrap"}}>
      <span>📍 {c.address}</span>{c.phone&&<span>📞 {c.phone}</span>}<span>🕐 {c.date}</span>
    </div>
    <p style={{fontSize:"0.83rem",color:"var(--muted)",lineHeight:1.72}}>{c.desc}</p>
    <div style={{display:"flex",gap:"0.38rem",marginTop:"0.8rem",flexWrap:"wrap"}}>
      <button onClick={onVote} style={{background:has?"rgba(79,125,255,.15)":"var(--card2)",border:`1px solid ${has?"var(--accent)":"var(--border)"}`,color:has?"var(--accent)":"var(--muted)",fontSize:"0.7rem",padding:"4px 9px",borderRadius:6,cursor:"pointer"}}>▲ Helpful {c.votes}</button>
      <button onClick={()=>setShow(s=>!s)} style={{background:"var(--card2)",border:"1px solid var(--border)",color:"var(--muted)",fontSize:"0.7rem",padding:"4px 9px",borderRadius:6,cursor:"pointer"}}>💬 {(c.comments||[]).length}</button>
      <button onClick={()=>{try{navigator.clipboard.writeText(window.location.href);}catch(e){}showToast("Link copied!");}} style={{background:"var(--card2)",border:"1px solid var(--border)",color:"var(--muted)",fontSize:"0.7rem",padding:"4px 9px",borderRadius:6,cursor:"pointer"}}>🔗 Share</button>
    </div>
    {show&&<div style={{marginTop:"0.8rem",borderTop:"1px solid var(--border)",paddingTop:"0.8rem"}}>
      {(c.comments||[]).map((x,i)=><div key={i} style={{marginBottom:"0.5rem"}}><span style={{fontSize:"0.7rem",fontWeight:600}}>{x.user}</span><p style={{fontSize:"0.74rem",color:"var(--muted)",marginTop:2}}>{x.text}</p></div>)}
      <div style={{display:"flex",gap:"0.38rem",marginTop:"0.42rem"}}>
        <FI value={cm} onChange={e=>setCm(e.target.value)} placeholder="Add a comment..." style={{flex:1}}/>
        <button className="btn btn-primary btn-sm" onClick={addCm}>Post</button>
      </div>
    </div>}
  </div>;
}

/* ── COMMUNITY ── */
function Community({messages,setMessages,user,showToast,setModal}){
  const CHANS=[["general","# general"],["scam-alerts","🚨 scam-alerts"],["legal-help","⚖️ legal-help"],["mumbai","# mumbai"],["delhi","# delhi"],["bangalore","# bangalore"],["pune","# pune"],["moving-tips","📦 moving-tips"]];
  const MEM=[{n:"Ananya R.",c:"#4f7dff"},{n:"Vikram S.",c:"#7c5cfc"},{n:"Priya M.",c:"#10b981"},{n:"Raju D.",c:"#f59e0b"},{n:"Meera K.",c:"#ff4757"},{n:"Arjun N.",c:"#ec4899"},{n:"Dev T.",c:"#f97316"},{n:"🤖 HaramiBot",c:"#4f7dff"}];
  const [chan,setChan]=useState("general");const [inp,setInp]=useState("");const [ai,setAi]=useState(false);const [aiLoad,setAiLoad]=useState(false);const [showChans,setShowChans]=useState(false);
  const btmRef=useRef(null);const msgs=messages[chan]||[];
  useEffect(()=>{setTimeout(()=>btmRef.current?.scrollIntoView({behavior:"smooth"}),50);},[msgs.length,chan]);
  const send=async()=>{
    if(!inp.trim())return;
    if(!user&&!ai){setModal("login");return;}
    const txt=inp.trim();setInp("");
    const uMsg={id:"m"+Date.now(),user:user?user.name:"Guest",av:user?user.name.split(" ").map(x=>x[0]).join("").toUpperCase().slice(0,2):"G",color:"var(--accent)",text:txt,ts:Date.now(),own:true};
    setMessages(p=>({...p,[chan]:[...(p[chan]||[]),uMsg]}));
    if(ai){
      setAiLoad(true);
      const r=await callClaude(`You are HaramiBot in tenant community app. Channel: ${chan}. Give practical advice for Indian tenants. Under 120 words, be friendly.`,txt,msgs);
      setMessages(p=>({...p,[chan]:[...(p[chan]||[]),{id:"m"+(Date.now()+1),user:"🤖 HaramiBot",av:"AI",color:"#7c5cfc",text:r,ts:Date.now(),own:false,isAI:true}]}));
      setAiLoad(false);
    }
  };
  const fmt=ts=>new Date(ts).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
  return <div className={`chat-wrap${showChans?" mobile-chan":""}`}>
    <div className="chan-list">
      <div style={{fontSize:"0.58rem",textTransform:"uppercase",letterSpacing:"0.1em",color:"var(--muted2)",fontWeight:600,marginBottom:"0.45rem",paddingLeft:"0.45rem"}}>Channels</div>
      {CHANS.map(([id,lbl])=><button key={id} className={`chan-btn${chan===id?" active":""}`} onClick={()=>{setChan(id);setShowChans(false);}}>{lbl}</button>)}
    </div>
    <div className="chat-main">
      <div style={{padding:"0.72rem 1rem",borderBottom:"1px solid var(--border)",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0,background:"var(--bg)"}}>
        <div style={{display:"flex",alignItems:"center",gap:"0.5rem"}}>
          <button className="btn btn-ghost btn-sm" style={{display:"none"}} id="chan-toggle" onClick={()=>setShowChans(s=>!s)}>☰</button>
          <div style={{fontWeight:700,fontSize:"0.86rem",fontFamily:"Outfit"}}>{CHANS.find(c=>c[0]===chan)?.[1]}</div>
        </div>
        <button className={`btn btn-sm ${ai?"btn-primary":"btn-ghost"}`} onClick={()=>setAi(a=>!a)}>{ai?"🤖 AI ON":"🤖 AI Mode"}</button>
      </div>
      <div className="msg-list">
        {msgs.length===0&&<div style={{textAlign:"center",color:"var(--muted2)",fontSize:"0.8rem",paddingTop:"3rem"}}>No messages yet. Start the conversation! 👋</div>}
        {msgs.map(m=>(
          <div key={m.id} className={`msg-row${m.own?" own":""}`}>
            <div className="msg-av" style={{background:`${m.color}22`,color:m.color}}>{m.av}</div>
            <div>
              <div className="msg-time">{m.user} {fmt(m.ts)}</div>
              <div className={`msg-bubble${m.own?" out":m.isAI?" ai":" in"}`}>{m.text}</div>
            </div>
          </div>
        ))}
        {aiLoad&&<div className="msg-row"><div className="msg-av" style={{background:"rgba(124,92,252,.2)",color:"#7c5cfc"}}>AI</div><div><div className="msg-bubble in" style={{animation:"pulse 1.5s infinite",color:"var(--muted)"}}>HaramiBot is typing...</div></div></div>}
        <div ref={btmRef}/>
      </div>
      <div className="chat-input-row">
        {ai&&<span style={{fontSize:"0.6rem",background:"rgba(79,125,255,.15)",color:"#8fa8ff",border:"1px solid rgba(79,125,255,.25)",padding:"0 6px",borderRadius:5,height:32,display:"flex",alignItems:"center",flexShrink:0}}>🤖</span>}
        <input value={inp} onChange={e=>setInp(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&send()} placeholder={ai?"Ask HaramiBot...":"Send a message..."} className="fi" style={{flex:1}}/>
        <button onClick={send} style={{background:"linear-gradient(135deg,var(--accent),var(--accent2))",color:"#fff",border:"none",width:34,height:34,borderRadius:8,fontSize:"0.82rem",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>➤</button>
      </div>
    </div>
    <div className="members-panel">
      <div style={{fontSize:"0.58rem",textTransform:"uppercase",letterSpacing:"0.1em",color:"var(--muted2)",fontWeight:600,marginBottom:"0.55rem",paddingLeft:"0.45rem"}}>Online — {MEM.length}</div>
      {MEM.map(m=>(
        <div key={m.n} style={{display:"flex",alignItems:"center",gap:"0.45rem",padding:"0.28rem 0.45rem"}}>
          <div className="msg-av" style={{background:`${m.c}22`,color:m.c,width:24,height:24,fontSize:"0.55rem"}}>{m.n.split(" ").map(x=>x[0]).join("")}</div>
          <span style={{fontSize:"0.73rem",color:"var(--muted)",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{m.n}</span>
          <div style={{width:5,height:5,borderRadius:"50%",background:"#16a34a",flexShrink:0}}/>
        </div>
      ))}
    </div>
  </div>;
}

/* ── LIST PROPERTY ── */
function ListProp({listings,setListings,user,showToast,nav,setModal}){
  const [step,setStep]=useState(1);
  const [form,setForm]=useState({title:"",type:"PG",price:"",deposit:"",furnish:"Furnished",area:"",city:"",desc:"",contact:"",phone:"",amenities:[]});
  const [aiSug,setAiSug]=useState("");const [aiLoad,setAiLoad]=useState(false);
  const AMEN=["WiFi","AC","Parking","Geyser","Washing Machine","Cook","Security","Power Backup","Gym","CCTV","TV","Meals","Pool","Lift"];
  const tog=a=>setForm(f=>({...f,amenities:f.amenities.includes(a)?f.amenities.filter(x=>x!==a):[...f.amenities,a]}));
  const getAI=async()=>{
    if(!form.city){showToast("Enter city first","error");return;}
    setAiLoad(true);
    const r=await callClaude("You are an Indian property listing expert.","Write 3-sentence description and suggest rent range for: "+form.type+" in "+form.city+(form.area?", "+form.area:"")+", amenities: "+(form.amenities.join(",")||"basic")+" Current price: ₹"+(form.price||"not set"));
    setAiSug(r);setAiLoad(false);
  };
  const submit=()=>{
    if(!user){setModal("login");return;}
    if(!form.title||!form.price||!form.city||!form.contact||!form.phone){showToast("Fill all required fields","error");return;}
    setListings(p=>[{...form,id:"l"+Date.now(),price:parseInt(form.price),deposit:parseInt(form.deposit)||0,rating:0,reviews:[],scam:false,createdAt:new Date().toISOString().split("T")[0],lat:18+Math.random()*12,lng:72+Math.random()*14},...p]);
    showToast("🎉 Listing published!");nav("listings");
  };
  const fv=k=>({value:form[k],onChange:e=>setForm(p=>({...p,[k]:e.target.value}))});
  return <div className="wrap section" style={{maxWidth:660}}>
    <h2 style={{fontSize:"1.75rem",fontWeight:900,marginBottom:"0.38rem",fontFamily:"Outfit"}}>List Your Property</h2>
    <p style={{color:"var(--muted)",marginBottom:"1.6rem",fontSize:"0.83rem"}}>Reach thousands of tenants in your city.</p>
    <div className="step-bar">{[1,2,3].map(s=><div key={s} className="step-seg" onClick={()=>setStep(s)} style={{background:step>=s?"var(--accent)":"var(--card2)"}}/>)}</div>
    <div style={{fontSize:"0.7rem",color:"var(--muted2)",marginBottom:"1.2rem"}}>Step {step}/3 — {["Basic Details","Location & Amenities","Contact & Publish"][step-1]}</div>

    {step===1&&<div className="card" style={{padding:"1.4rem"}}>
      <h3 style={{fontWeight:800,fontSize:"0.95rem",marginBottom:"0.9rem",fontFamily:"Outfit"}}>Basic Details</h3>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:"0.8rem"}}>
        <div style={{gridColumn:"1/-1"}}><FL>Title *</FL><FI {...fv("title")} placeholder="e.g. Cozy 2BHK near Metro"/></div>
        <div><FL>Type</FL><FS {...fv("type")}><option>PG</option><option>Flat</option><option>Studio</option><option>Room</option></FS></div>
        <div><FL>Furnishing</FL><FS {...fv("furnish")}><option>Furnished</option><option>Semi-Furnished</option><option>Unfurnished</option></FS></div>
        <div><FL>Monthly Rent (₹) *</FL><FI {...fv("price")} type="number" placeholder="12000"/></div>
        <div><FL>Security Deposit (₹)</FL><FI {...fv("deposit")} type="number" placeholder="24000"/></div>
        <div style={{gridColumn:"1/-1"}}><FL>Description</FL><textarea {...fv("desc")} rows={4} placeholder="Describe the property..." className="fi" style={{resize:"vertical"}}/></div>
      </div>
      <button className="btn btn-primary" style={{marginTop:"0.9rem"}} onClick={()=>setStep(2)}>Next →</button>
    </div>}

    {step===2&&<div className="card" style={{padding:"1.4rem"}}>
      <h3 style={{fontWeight:800,fontSize:"0.95rem",marginBottom:"0.9rem",fontFamily:"Outfit"}}>Location & Amenities</h3>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:"0.8rem",marginBottom:"0.9rem"}}>
        <div><FL>Area / Locality *</FL><FI {...fv("area")} placeholder="e.g. Koramangala"/></div>
        <div><FL>City *</FL><FI {...fv("city")} placeholder="e.g. Bangalore"/></div>
      </div>
      <FL>Amenities</FL>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(110px,1fr))",gap:"0.38rem",marginBottom:"0.9rem",marginTop:"0.38rem"}}>
        {AMEN.map(a=><label key={a} style={{display:"flex",alignItems:"center",gap:"0.35rem",background:form.amenities.includes(a)?"rgba(79,125,255,.12)":"var(--card2)",border:`1px solid ${form.amenities.includes(a)?"var(--accent)":"var(--border)"}`,borderRadius:7,padding:"0.4rem 0.5rem",cursor:"pointer",fontSize:"0.73rem",color:form.amenities.includes(a)?"#8fa8ff":"var(--muted)"}}>
          <input type="checkbox" checked={form.amenities.includes(a)} onChange={()=>tog(a)} style={{accentColor:"var(--accent)"}}/>{a}
        </label>)}
      </div>
      <div style={{background:"var(--card2)",border:"1px solid rgba(79,125,255,.2)",borderRadius:9,padding:"0.85rem",marginBottom:"0.9rem"}}>
        <div style={{fontSize:"0.7rem",color:"#8fa8ff",fontWeight:600,marginBottom:"0.28rem"}}>🤖 AI Listing Assistant</div>
        <button className="btn btn-primary btn-sm" style={{marginBottom:"0.4rem",opacity:aiLoad?.6:1}} onClick={getAI} disabled={aiLoad}>{aiLoad?"Generating...":"Get AI Suggestions"}</button>
        {aiSug&&<div style={{fontSize:"0.72rem",color:"var(--text)",lineHeight:1.72}}>{aiSug}</div>}
      </div>
      <div style={{display:"flex",gap:"0.45rem"}}>
        <button className="btn btn-ghost" onClick={()=>setStep(1)}>← Back</button>
        <button className="btn btn-primary" onClick={()=>setStep(3)}>Next →</button>
      </div>
    </div>}

    {step===3&&<div className="card" style={{padding:"1.4rem"}}>
      <h3 style={{fontWeight:800,fontSize:"0.95rem",marginBottom:"0.9rem",fontFamily:"Outfit"}}>Contact & Publish</h3>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:"0.8rem"}}>
        <div><FL>Your Name *</FL><FI {...fv("contact")} placeholder="Full name"/></div>
        <div><FL>Phone *</FL><FI {...fv("phone")} placeholder="+91 98XXXXXXXX"/></div>
      </div>
      <div style={{background:"var(--card2)",borderRadius:10,padding:"0.95rem",marginTop:"0.9rem",border:"1px solid var(--border)"}}>
        <div style={{fontSize:"0.62rem",color:"var(--muted2)",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:"0.5rem"}}>Preview</div>
        <div style={{fontFamily:"Outfit",fontWeight:700,fontSize:"0.95rem",color:"var(--text)"}}>{form.title||"Your listing title"}</div>
        <div style={{fontSize:"0.7rem",color:"var(--muted)",margin:"0.2rem 0"}}>📍 {form.area||"Area"}, {form.city||"City"}</div>
        <div style={{fontSize:"1.1rem",fontWeight:700,color:"var(--gold)",fontFamily:"Outfit"}}>₹{form.price?parseInt(form.price).toLocaleString():"—"}<span style={{fontSize:"0.65rem",color:"var(--muted2)",fontWeight:400}}>/mo</span></div>
      </div>
      <div style={{display:"flex",gap:"0.45rem",marginTop:"0.9rem"}}>
        <button className="btn btn-ghost" onClick={()=>setStep(2)}>← Back</button>
        <button className="btn btn-primary" style={{flex:1,padding:"0.65rem"}} onClick={submit}>🚀 Publish Listing</button>
      </div>
    </div>}
  </div>;
}

/* ── AUTH ── */
function LoginModal({setModal,setUser,showToast}){
  const [email,setEmail]=useState("");const [pass,setPass]=useState("");const [err,setErr]=useState("");
  const login=()=>{
    if(!email||!pass){setErr("Fill all fields");return;}
    const s=lsG("hl:users")||{};
    if(!s[email]){setErr("No account found.");return;}
    if(s[email].password!==pass){setErr("Incorrect password");return;}
    setUser(s[email]);showToast("✅ Welcome back, "+s[email].name+"!");setModal(null);
  };
  return <MW onClose={()=>setModal(null)}>
    <h3 style={{fontFamily:"Outfit",fontWeight:800,fontSize:"1.15rem",marginBottom:"0.32rem"}}>Welcome back 👋</h3>
    <p style={{color:"var(--muted)",fontSize:"0.78rem",marginBottom:"1.1rem"}}>Sign in to list, report & chat.</p>
    {err&&<div style={{background:"rgba(255,71,87,.09)",border:"1px solid rgba(255,71,87,.22)",color:"#ff8a95",borderRadius:7,padding:"0.38rem 0.75rem",fontSize:"0.76rem",marginBottom:"0.75rem"}}>{err}</div>}
    <div style={{marginBottom:"0.7rem"}}><FL>Email</FL><FI value={email} onChange={e=>setEmail(e.target.value)} type="email" placeholder="you@example.com"/></div>
    <div style={{marginBottom:"0.9rem"}}><FL>Password</FL><FI value={pass} onChange={e=>setPass(e.target.value)} type="password" placeholder="••••••••"/></div>
    <button className="btn btn-primary" style={{width:"100%",padding:"0.62rem"}} onClick={login}>Sign In</button>
    <p style={{textAlign:"center",marginTop:"0.8rem",fontSize:"0.76rem",color:"var(--muted2)"}}>No account? <span onClick={()=>setModal("register")} style={{color:"var(--accent)",cursor:"pointer"}}>Register free</span></p>
  </MW>;
}
function RegModal({setModal,setUser,showToast}){
  const [form,setForm]=useState({name:"",email:"",pass:""});const [err,setErr]=useState("");
  const reg=()=>{
    if(!form.name||!form.email||!form.pass){setErr("Fill all fields");return;}
    if(form.pass.length<6){setErr("Password must be 6+ characters");return;}
    const s=lsG("hl:users")||{};
    if(s[form.email]){setErr("Email already registered");return;}
    const u={name:form.name,email:form.email,password:form.pass,joinedAt:Date.now()};
    s[form.email]=u;lsS("hl:users",s);
    setUser(u);showToast("🎉 Welcome to HaramiLandlord!");setModal(null);
  };
  return <MW onClose={()=>setModal(null)}>
    <h3 style={{fontFamily:"Outfit",fontWeight:800,fontSize:"1.15rem",marginBottom:"0.32rem"}}>Create Account</h3>
    <p style={{color:"var(--muted)",fontSize:"0.78rem",marginBottom:"1.1rem"}}>Join thousands of tenants protecting each other.</p>
    {err&&<div style={{background:"rgba(255,71,87,.09)",border:"1px solid rgba(255,71,87,.22)",color:"#ff8a95",borderRadius:7,padding:"0.38rem 0.75rem",fontSize:"0.76rem",marginBottom:"0.75rem"}}>{err}</div>}
    {[["name","Full Name","Ravi Kumar","text"],["email","Email","you@example.com","email"],["pass","Password","Min 6 characters","password"]].map(([k,l,ph,t])=>(
      <div key={k} style={{marginBottom:"0.75rem"}}><FL>{l}</FL><FI value={form[k]} onChange={e=>setForm(f=>({...f,[k]:e.target.value}))} type={t} placeholder={ph}/></div>
    ))}
    <button className="btn btn-primary" style={{width:"100%",padding:"0.62rem"}} onClick={reg}>Create Account</button>
    <p style={{textAlign:"center",marginTop:"0.8rem",fontSize:"0.76rem",color:"var(--muted2)"}}>Already registered? <span onClick={()=>setModal("login")} style={{color:"var(--accent)",cursor:"pointer"}}>Sign In</span></p>
  </MW>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
